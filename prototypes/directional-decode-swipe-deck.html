<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Userland directional decode deck</title><style>:root{--cw:8px;--ch:14px;--bg:#030303;--fg:#49ee5d;--dim:#526b55;--panel:#060606;--panel2:#151015;--cyan:#20c8d2;--yellow:#e8c94c;--red:#e3313b;--purple:#b34fea;--blue:#359be8;--dark:#030303}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);touch-action:none;-webkit-text-size-adjust:100%;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}#bar{position:fixed;left:0;right:0;top:0;height:22px;display:flex;gap:3px;padding:2px 3px;box-sizing:border-box;background:#020202;border-bottom:1px solid #2b2b2b;z-index:2}button{font:9px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--fg);background:#070707;border:1px solid #286d30;border-radius:0;padding:4px 5px;text-transform:uppercase}button.active{color:#030303;background:var(--fg)}#r{margin-left:auto;color:var(--dim);font:9px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap}#host{position:fixed;left:0;right:0;top:22px;bottom:0;display:grid;place-content:start center}.term{display:grid;grid-template-columns:repeat(var(--cols),var(--cw));grid-template-rows:repeat(var(--rows),var(--ch));width:calc(var(--cols)*var(--cw));height:calc(var(--rows)*var(--ch));font:650 11px/var(--ch) ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;text-transform:uppercase;background:#030303;overflow:hidden;contain:strict}.c{width:var(--cw);height:var(--ch);line-height:var(--ch);display:block;overflow:hidden;white-space:pre}.fg{color:var(--fg)}.dim{color:var(--dim)}.cyan{color:var(--cyan)}.yellow{color:var(--yellow)}.red{color:var(--red)}.purple{color:var(--purple)}.blue{color:var(--blue)}.dark{color:var(--dark)}.panel{background:var(--panel)}.panel2{background:var(--panel2)}.inv{color:var(--dark);background:var(--fg)}.scan{color:var(--dark);background:var(--cyan)}.warn{color:var(--dark);background:var(--yellow)}.danger{color:var(--dark);background:var(--red)}.purplebg{color:var(--dark);background:var(--purple)}.bluebg{color:var(--dark);background:var(--blue)}</style><div id="bar"><button data-i="0" class="active">NOW</button><button data-i="1">RUNS</button><button data-i="2">SOUL</button><button data-i="3">MARKET</button><button data-i="4">NET</button><span id="r"></span></div><div id="host"></div><script>const CW=8,CH=14,S=2.45,names=['NOW','RUNS','SOUL','MARKET','NET'],junk='%#$?\\/|+*X░▒▓╬╫╪';let cols=0,rows=0,cells=[],scr=0,tick=0,tr=999,dir=1,from=[],to=[],sx=0,sy=0,down=false;function fit(){cols=Math.floor(innerWidth/CW);rows=Math.floor((innerHeight-22)/CH)}function cl(c='fg',b=''){return'c '+c+(b?' '+b:'')}function p(x,y,ch,c='fg',b=''){if(x<0||y<0||x>=cols||y>=rows)return;let e=cells[y*cols+x];e.textContent=ch;e.className=cl(c,b)}function tx(x,y,s,c='fg',b=''){s=String(s).toUpperCase();for(let i=0;i<s.length&&x+i<cols;i++)p(x+i,y,s[i],c,b)}function fl(x,y,w,h,ch=' ',c='fg',b='panel'){for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)p(xx,yy,ch,c,b)}function clear(){for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)p(x,y,' ')}function box(x,y,w,h,t='',c='fg',b='panel'){fl(x,y,w,h,' ','fg',b);tx(x,y,'╭'+'─'.repeat(Math.max(0,w-2))+'╮',c,b);for(let yy=y+1;yy<y+h-1;yy++){p(x,yy,'│',c,b);p(x+w-1,yy,'│',c,b)}tx(x,y+h-1,'╰'+'─'.repeat(Math.max(0,w-2))+'╯',c,b);if(t)tx(x+2,y,t,c,b)}function solid(x,y,w,h,t='',edge='cyan',b='panel'){fl(x,y,w,h,' ','fg',b);let eb=edge=='red'?'danger':edge=='yellow'?'warn':edge=='purple'?'purplebg':edge=='blue'?'bluebg':'scan';for(let xx=x;xx<x+w;xx++){p(xx,y,' ','dark',eb);p(xx,y+h-1,' ','dark',eb)}for(let yy=y;yy<y+h;yy++){p(x,yy,' ','dark',eb);p(x+w-1,yy,' ','dark',eb)}if(t)tx(x+2,y,t,'dark',eb)}function rail(){let y=rows-4,w=Math.floor(cols/5);fl(0,y,cols,4,' ','fg','panel2');names.forEach((n,i)=>tx(i*w+1,y+1,n,i==scr?'dark':'fg',i==scr?'inv':'panel2'));tx(2,rows-1,'SWIPE / TAP / ARROWS','dim','panel2')}function top(t,c='cyan'){solid(0,0,cols,3,t,c);tx(2,1,'INDEX:NATURAL WORLD  AURA 88  NERVE 19  HEAT 07  SEN 12.4K','fg','panel')}function bars(x,y,n,c='fg'){tx(x,y,'█'.repeat(Math.round(n/10))+'░'.repeat(10-Math.round(n/10)),c,'panel')}function lines(x,y,a,c='fg',b='panel'){a.forEach((l,r)=>{for(let i=0;i<l.length;i++){let ch=l[i],cc=c;if('●◉◇'.includes(ch))cc='yellow';if(ch=='▓')cc='cyan';p(x+i,y+r,ch,cc,b)}})}function now(){top('NOW / SIGNAL COMMAND');solid(1,4,cols-2,14,'BEST NEXT ACTION');tx(4,7,'RUN INDEX: OLD HOSPITAL / LOW RISK','yellow','panel');tx(4,9,'COST  6 AURA / 1 NERVE','fg','panel');tx(4,11,'RISK  HEAT +2 / COHERENCE SAFE','fg','panel');tx(4,13,'REWARD MEMORY ECHO + SEN','fg','panel');tx(4,16,'[R]RUN NOW  [L]LOAD METHODS','dark','inv');box(1,20,cols-2,10,'UTILITY RACK');['AURA TRICKLE BOT      +3/H','MARKET WATCH          2 ALERTS','CREW PING             1 ONLINE','SAFEHOUSE TIMER       12M'].forEach((l,i)=>tx(3,23+i,l,i==1?'yellow':'fg','panel'));box(1,32,cols-2,rows-37,'NETWIRE','yellow');tx(3,35,'JADENET SIGNAL: NEW OPEN INDEX TOOLS RELEASED','fg','panel');tx(3,37,'GIL AUDIT PRESSURE RISING IN DEEP PIT','red','panel');rail()}function runs(){top('RUNS / INDEX INTRUSION','red');box(1,4,cols-2,22,'TARGET GRID','red');for(let y=7;y<22;y++)for(let x=4;x<cols-4;x++){let v=(x*7+y*11)%19;p(x,y,v<2?'#':v<10?'.':' ',v<2?'dim':'fg','panel')}lines(7,9,['╔●╗','╚╦╝','◉╬◉'],'cyan');lines(cols-18,14,['╔══════╗','║ ICE  ║','║  ◇   ║','╚══╦═══╝'],'red');solid(1,28,cols-2,9,'METHOD LOADOUT','yellow');['1 KERNEL LENS      READY','2 TRACE WIPE        03','3 PATCH SPOOL       READY','4 LOG HARPOON       TARGET'].forEach((l,i)=>tx(4,30+i,l,i==0?'cyan':'fg','panel'));tx(4,36,'[I]INSPECT [B]BREACH [E]EXTRACT','dark','inv');rail()}function soul(){top('SOUL / DIAGNOSTIC','purple');solid(1,4,cols-2,16,'IDENTITY STATE','purple');[['COHER',82,'fg'],['INTEG',74,'cyan'],['SHAT',18,'yellow'],['USER',61,'purple']].forEach((r,i)=>{tx(4,7+i*3,r[0],r[2],'panel');bars(12,7+i*3,r[1]/10,r[2]);tx(25,7+i*3,r[1]+'%','fg','panel')});box(1,22,cols-2,11,'MEMORY ECHOES');['ECHO.041  HOSPITAL HALLWAY','ECHO.119  FIRST JACK','ECHO.203  UNLINKING DREAM'].forEach((l,i)=>tx(4,25+i*2,l,i==0?'yellow':'fg','panel'));box(1,35,cols-2,rows-40,'RECOVERY OPTIONS','yellow');tx(4,38,'[R]REPAIR COHERENCE  [S]STUDY ECHO  [B]BAIL DEEP PIT','fg','panel');rail()}function market(){top('MARKET / ITEMS + LOADOUT','yellow');solid(1,4,cols-2,14,'SELECTED ITEM','yellow');lines(4,7,['     ╔════════╗','[]═══╣ ╔●╗    ╠══[]','     ║ ║◉║    ║','     ╚═╬╬╬════╝','       ▓▓▓'],'cyan');tx(27,7,'EIDOLON BREACH LATTICE','yellow','panel');tx(27,9,'RARITY EXOTIC','purple','panel');tx(27,11,'VALUE  288K SEN','fg','panel');tx(27,16,'[E]EQUIP [S]SELL [M]MODS','dark','inv');box(1,20,cols-2,18,'INVENTORY ROWS');['KERNEL LENS          RARE      12K','PATCH SPOOL          UNCOMMON  3K','TRACE WIPE           COMMON    1K','LATTICE FRAME        EXOTIC    288K','AURA CELL MK2        RARE      9K','MEMORY BIOSOFT       EPIC      44K'].forEach((l,i)=>tx(4,23+i*2,l,i==3?'purple':i==5?'yellow':'fg','panel'));rail()}function net(){top('NET / WORLD SIGNAL','blue');box(1,4,cols-2,12,'NETWIRE','blue');['21:14 JADENET RELEASED INDEX PATCH','21:12 CREW // MIRA SHARED A RUN RESULT','21:10 BLACK MARKET WATCH: LATTICE +12%','21:06 GIL AUDIT FLAG NEAR DEEP PIT'].forEach((l,i)=>tx(4,7+i*2,l,i==3?'red':'fg','panel'));box(1,18,cols-2,15,'CHAT / CREW');['#CREW','MIRA: NEED ONE MORE ON LOW HEAT RUN','DAX: SELL RELICS BEFORE RESET','YOU: ...'].forEach((l,i)=>tx(4,21+i*2,l,i==0?'yellow':'fg','panel'));box(1,35,cols-2,rows-40,'MAIL / FORUM / FACTION','cyan');tx(4,38,'2 MAIL  4 FORUM REPLIES  1 FACTION CONTRACT','fg','panel');rail()}function render(i){clear();scr=i;[now,runs,soul,market,net][i]()}function buf(){return cells.map(e=>({ch:e.textContent,cn:e.className}))}function wr(b){for(let i=0;i<b.length;i++){cells[i].textContent=b[i].ch;cells[i].className=b[i].cn}}function bg(cn){return cn.split(' ').find(k=>['panel','panel2','inv','warn','danger','scan','purplebg','bluebg'].includes(k))||''}function dec(){wr(from);let front=tr*S;for(let sx=0;sx<cols;sx++){let x=dir>0?sx:cols-1-sx,cp=front-sx;if(cp<0)continue;for(let y=0;y<rows;y++){let idx=y*cols+x,t=to[idx],ph=cp+((y*7+x*3)%6)-2;if(ph>=7){cells[idx].textContent=t.ch;cells[idx].className=t.cn}else if(ph>=0){let blank=t.ch==' ';p(x,y,blank?' ':junk[(x+y+tick)%junk.length],blank?'fg':(ph>3?(t.cn.split(' ')[1]||'fg'):(y%3==0?'cyan':y%3==1?'yellow':'fg')),bg(t.cn))}}}tr++;if(front>cols+10){wr(to);tr=999}}function draw(){if(tr<999)dec();else render(scr);r.textContent=`8X14 ${cols}X${rows} // ${names[scr]} // ${dir>0?'LEFT→RIGHT':'RIGHT→LEFT'}`}function go(i){i=Math.max(0,Math.min(4,i));if(i==scr)return;let old=scr;dir=i>old?1:-1;render(scr);from=buf();render(i);to=buf();scr=i;tr=0;document.querySelectorAll('button').forEach((b,k)=>b.classList.toggle('active',k==scr))}function build(){fit();let t=document.createElement('div');t.className='term';t.style.setProperty('--cols',cols);t.style.setProperty('--rows',rows);let f=document.createDocumentFragment();cells=[];for(let i=0;i<cols*rows;i++){let e=document.createElement('span');e.className='c fg';e.textContent=' ';cells.push(e);f.appendChild(e)}t.appendChild(f);host.replaceChildren(t);render(scr)}function loop(){tick++;draw();requestAnimationFrame(loop)}document.querySelectorAll('button').forEach(b=>b.onclick=()=>go(+b.dataset.i));host.onpointerdown=e=>{down=true;sx=e.clientX;sy=e.clientY};host.onpointerup=e=>{if(!down)return;down=false;let dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy))go(scr+(dx<0?1:-1))};onkeydown=e=>{if(e.key=='ArrowRight')go(scr+1);if(e.key=='ArrowLeft')go(scr-1)};onresize=build;build();loop();</script>
